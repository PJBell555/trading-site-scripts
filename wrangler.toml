name = "trading-site-scripts"
main = "workers/transactions.js"
compatibility_date = "2024-11-01"

[vars]
GITHUB_REPOSITORY = "PJBell555/trading-site-scripts"
GITHUB_BRANCH = "main"
HISTORY_PATH = "transactions.json"
BACKUP_DIR = "backups"
SETTINGS_PATH = "settings.json"
ADVISORY_PATH = "advisory-snapshots.json"
ALLOWED_ORIGIN = "https://pjbell555.github.io"
OPENROUTER_SITE_URL = "https://pjbell555.github.io/trading-site-scripts/"
OPENROUTER_APP_NAME = "ComHedge 2"
PAPER_TRADER_EMAILS = "peter@pjbell.com,aretwo3000@gmail.com,ai4ses@gmail.com"
# Safety guard: D1 is the runtime store. If a deployment ever loses the DB
# binding and falls back to GitHub storage, this prevents generated data commits.
PAUSE_GIT_WRITES = "true"

[triggers]
crons = ["*/5 * * * *"]

# Runtime storage for paper trades, actual trades, advisory snapshots,
# shared settings, and token usage telemetry.
[[d1_databases]]
binding = "DB"
database_name = "comhedge-runtime"
database_id = "37372cc9-e4b2-4be9-876c-03e7b96241cc"

[[secrets_store_secrets]]
binding = "OPENROUTER_API_KEY"
store_id = "64990a5fc9b64196b63cfe82555e6fd4"
secret_name = "OPENROUTER_API_KEY"
