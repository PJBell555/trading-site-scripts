name = "trading-site-scripts"
main = "workers/transactions.js"
compatibility_date = "2024-11-01"

[vars]
GITHUB_REPOSITORY = "PJBell555/trading-site-scripts"
GITHUB_BRANCH = "main"
HISTORY_PATH = "transactions.json"
BACKUP_DIR = "backups"
SETTINGS_PATH = "settings.json"
ADVISORY_PATH = "advisory-snapshots.json"
ALLOWED_ORIGIN = "https://pjbell555.github.io"
OPENROUTER_SITE_URL = "https://pjbell555.github.io/trading-site-scripts/"
OPENROUTER_APP_NAME = "ComHedge 2"
# Set to "true" temporarily (and re-deploy) to halt all worker writes to
# GitHub while a GH Pages deploy needs an undisturbed build window. The
# saveJsonFile gate in workers/transactions.js short-circuits when this is
# truthy. Auto-deploy from CF Workers Builds picks the value up from this
# file, so the pause survives auto-redeploys until reverted here.
# PAUSE_GIT_WRITES = "true"

[[secrets_store_secrets]]
binding = "OPENROUTER_API_KEY"
store_id = "64990a5fc9b64196b63cfe82555e6fd4"
secret_name = "OPENROUTER_API_KEY"
